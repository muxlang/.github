name: Bug report
description: Report a bug on mux-lang.dev or the playground
labels: ["needs triage"]
assignees: ["DerekCorniello"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1. URL or page:
        2. Action taken:
        3. What happened:
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
  - type: input
    id: os
    attributes:
      label: OS
