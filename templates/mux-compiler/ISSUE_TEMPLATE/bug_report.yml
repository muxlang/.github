name: Bug report
description: Report incorrect compiler behavior or a crash
labels: ["needs triage"]
assignees: ["DerekCorniello"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error output if any.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Minimal example
      render: text
      description: Smallest Mux program that reproduces the problem.
  - type: input
    id: version
    attributes:
      label: mux --version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
