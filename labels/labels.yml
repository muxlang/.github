# Canonical label set for every muxlang repo. Apply with scripts/sync-labels.sh.
# Policy: mux-context/docs/repo-governance.md. ASCII only; 6-digit hex colors.

# --- Kind ---
- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation
- name: chore
  color: fc9e1b
  description: Cleanup, maintenance, or dependency bumps
- name: refactor
  color: 5319e7
  description: Internal restructuring with no behavior change
- name: optimization
  color: 0f0cc1
  description: Performance or efficiency improvement
- name: testing
  color: 9f267d
  description: Test coverage or test infrastructure
- name: enhancement
  color: a2eeef
  description: Improvement to existing behavior or UX

# --- Quality ---
- name: inconsistency
  color: c5def5
  description: Behaves or looks different across places that should match
- name: polish
  color: bfd4f2
  description: Small rough edge or papercut; nothing broken, just unrefined

# --- Workflow / triage ---
- name: needs triage
  color: ededed
  description: Not yet reviewed or categorized
- name: blocked
  color: 7b0000
  description: Blocked on another issue or external dependency
- name: needs testing
  color: d33294
  description: Needs testing to confirm all cases are covered
- name: duplicate
  color: cfd3d7
  description: This issue or pull request already exists
- name: invalid
  color: e4e669
  description: This does not seem right
- name: wontfix
  color: ffffff
  description: This will not be worked on

# --- Community ---
- name: good first issue
  color: 7057ff
  description: Good for newcomers
- name: help wanted
  color: 008672
  description: Extra attention is needed
